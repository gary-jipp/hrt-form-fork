name: Build & Deploy API to Development

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    types: [ opened, edited, reopened, review_requested ]
    branches: [ master ]

env:
  OPENSHIFT_NAMESPACE: ${{ secrets.OPENSHIFT_NAMESPACE }}
  BUILD_CONFIG: django

jobs:

  openshift-build:
    runs-on: ubuntu-latest

    steps:
      - name: Run OpenShift build
        uses: redhat-developer/openshift-actions@v1.1
        with:
          version: "latest"
          openshift_server_url: ${{ secrets.OPENSHIFT_URL }}
          parameters: '{"apitoken": "${{ secrets.OPENSHIFT_TOKEN }}", "acceptUntrustedCerts": "true"}'
          cmd: |
            'version'
            'start-build ${BUILD_CONFIG} -n ${OPENSHIFT_NAMESPACE} --follow'

      - name: Check OpenShift build status
        run: |
          last_build=$(oc get builds -n ${OPENSHIFT_NAMESPACE} --selector=buildconfig=${BUILD_CONFIG} --sort-by='.metadata.creationTimestamp' -o jsonpath='{.items[-1].metadata.name}')
          echo "Build name: ${last_build}"
          build_status=$(oc get build ${last_build} -o jsonpath='{.status.phase}')
          if [[ "$build_status" != "Complete" ]]; then
            echo "Build failed"
            exit 1
          fi
